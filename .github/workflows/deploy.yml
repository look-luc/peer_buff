name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read # Default to read-only for safety

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Elevate only for this specific job
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Added --ignore-scripts to prevent malware from running during install
        run: npm ci --ignore-scripts

      - name: Build Production Site
        # Removed CI=false to ensure safety warnings are seen
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
